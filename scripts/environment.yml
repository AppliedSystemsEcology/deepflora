name: deepflorav2
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip=22.3
  - setuptools=65
  - r-base=4.3
  - r-reticulate
  - rpy2
  - gcc_linux-64
  - gxx_linux-64
  - libstdcxx-ng
  - pip:
    - torch==1.10.2+cu113 --extra-index-url https://download.pytorch.org/whl/cu113
    - torchvision==0.11.3+cu113
    - torchaudio==0.10.2
    - "numpy<2.0"
    - inplace-abn
    - "tensorboard<2.11"
    - "deepbiosphere @ git+https://github.com/moiexpositoalonsolab/Deepbiosphere.git"
